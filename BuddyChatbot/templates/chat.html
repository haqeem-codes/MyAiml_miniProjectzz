<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Buddy</title>
    <link rel="icon" href="/static/Logo.png" type="image/png">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100vw;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header img {
            height: 150px;
        }

        .chat-window {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: black;
            display: flex;
            flex-direction: column;
        }

        .message-box {
            max-width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: white;
            color: black;
            padding: 12px;
            border-radius: 8px;
            max-width: 60%;
        }

        .bot-message-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        .bot-message {
            background: yellow;
            color: black;
            padding: 15px;
            border-radius: 8px;
            max-width: 80%;
            margin-top: 5px;
            font-size: 16px;
        }

        .bot-message-title {
            font-weight: bold;
            color: yellow;
            margin-bottom: 3px;
        }

        .input-container {
            display: flex;
            padding: 10px;
            background: black;
            align-items: center;
        }

        textarea {
            flex-grow: 1;
            height: 40px;
            padding: 8px;
            font-size: 16px;
            border-radius: 8px;
            background: white;
            color: black;
            border: none;
            resize: none;
        }

        .send-btn {
            width: 60px;
            height: 60px;
            background: white;
            color: black;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            border: none;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

    </style>
</head>
<body>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD1BQAfTnGZlyiJpJ_zhHfY0dMMo17eBIM",
            authDomain: "buisness-buddy.firebaseapp.com",
            projectId: "buisness-buddy",
            storageBucket: "buisness-buddy.firebasestorage.app",
            messagingSenderId: "322423238447",
            appId: "1:322423238447:web:a90410d28651a276b7fbda"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "/";
            }
        });

        async function sendMessage() {
            const messageBox = document.getElementById("userMessage");
            const chatWindow = document.getElementById("chatWindow");
            const message = messageBox.value.trim();
            if (!message) return;

            // Append user message
            const userMessageDiv = document.createElement("div");
            userMessageDiv.className = "message-box user-message";
            userMessageDiv.textContent = message;
            chatWindow.appendChild(userMessageDiv);

            messageBox.value = "";

            // Send to backend
            const response = await fetch("/chatbot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message }),
            });

            const data = await response.json();

            // Append bot response in a structured box
            const botContainer = document.createElement("div");
            botContainer.className = "bot-message-container";

            const botTitle = document.createElement("div");
            botTitle.className = "bot-message-title";
            botTitle.textContent = "Business Buddy says:";

            const botMessageDiv = document.createElement("div");
            botMessageDiv.className = "message-box bot-message";
            botMessageDiv.textContent = data.reply;

            botContainer.appendChild(botTitle);
            botContainer.appendChild(botMessageDiv);
            chatWindow.appendChild(botContainer);

            // Scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.addEventListener("DOMContentLoaded", function () {
            const messageBox = document.getElementById("userMessage");

            messageBox.addEventListener("keydown", function (event) {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault(); // Prevents new line
                    sendMessage(); // Calls sendMessage function
                }
            });
        });
    </script>

    <div class="chat-container">
        <div class="chat-header">
            <img src="/static/Logo.png" alt="Business Buddy Logo">
        </div>
        <div class="chat-window" id="chatWindow"></div>
        <div class="input-container">
            <textarea id="userMessage" placeholder="Type your message here..."></textarea>
            <button class="send-btn" onclick="sendMessage()">➡</button>
        </div>
    </div>

</body>
</html>
