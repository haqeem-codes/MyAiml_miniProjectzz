<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ symbol }} News</title>

    <style>
        /* Background */
        body { 
            background: linear-gradient(45deg, #000000, #1a0000, #8B0000);  
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            color: #FF4500;
            text-shadow: 2px 2px 10px rgba(255, 69, 0, 0.8);
            margin-bottom: 20px;
        }

        /* Glassmorphism Container */
        .container {
            width: 80%;
            margin: auto;
            text-align: left;
        }

        .news-box {
            background: rgba(34, 34, 34, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 69, 0, 0.5);
            box-shadow: 0px 0px 20px rgba(255, 69, 0, 0.8);
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease-in-out;
        }

        /* News Links */
        a {
            font-size: 18px;
            font-weight: bold;
            color: cyan;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: #FFD700;
            text-shadow: 0px 0px 10px #FFD700;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 12px;
            border: 2px solid white;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: #FF4500;
            color: white;
            text-decoration: none;
        }

        .btn:hover {
            background: #FFD700;
            color: black;
            border-color: #FFD700;
            box-shadow: 0px 0px 15px #FFD700;
        }

        /* Fade-in Animation */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <h1>📰 {{ symbol }} Latest News</h1>

    <!-- Back Button -->
    <a href="{{ url_for('index') }}" class="btn">🔙 Back to Prediction</a>

    <div class="container">
        {% if news_data %}
            {% for news in news_data %}
                <div class="news-box">
                    <a href="{{ news.link }}" target="_blank">
                        🔗 {{ news.title }}
                    </a>
                </div>
            {% endfor %}
        {% else %}
            <h3 style="color: lightgray;">No news found for {{ symbol }}.</h3>
        {% endif %}
    </div>
</body>
</html>
