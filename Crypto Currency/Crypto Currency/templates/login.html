<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <style>
        /* Background */
        body { 
            background: linear-gradient(45deg, #000000, #1a0000, #8B0000);  
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1s ease-in-out;
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(34, 34, 34, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            border: 2px solid rgba(255, 69, 0, 0.5);
            box-shadow: 0px 0px 20px rgba(255, 69, 0, 0.8);
            position: relative;
        }

        h2 {
            color: #FF4500;
            text-shadow: 2px 2px 10px rgba(255, 69, 0, 0.8);
            margin-bottom: 20px;
        }

        /* Floating Labels */
        .input-container {
            position: relative;
            margin: 15px 0;
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(51, 51, 51, 0.5);
            border: 2px solid #FF4500;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        label {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            background: rgba(34, 34, 34, 0.8);
            padding: 0 5px;
            transition: 0.3s;
            color: #FFD700;
            font-size: 14px;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: 5px;
            font-size: 12px;
            color: #FFD700;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            border: 2px solid white;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: #FF4500;
            color: white;
        }

        button:hover {
            background: #FFD700;
            color: black;
            border-color: #FFD700;
            box-shadow: 0px 0px 15px #FFD700;
        }

        /* Loading Animation */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Link Styles */
        p { font-size: 14px; color: #FFD700; }
        a { color: #FFD700; cursor: pointer; text-decoration: none; }
        a:hover { text-decoration: underline; }

    </style>

    <script>
        function showForm(formType) {
            let loginForm = document.getElementById('loginForm');
            let signupForm = document.getElementById('signupForm');
            let title = document.getElementById("formTitle");

            if (formType === "signup") {
                loginForm.style.display = "none";
                signupForm.style.display = "block";
                title.innerText = "Sign Up";
            } else {
                loginForm.style.display = "block";
                signupForm.style.display = "none";
                title.innerText = "Login";
            }
        }

        function showLoading(button) {
            button.innerHTML = '<span class="spinner"></span> Processing...';
            button.disabled = true;
        }
    </script>
</head>
<body>
    <div class="container">
        <h2 id="formTitle">Login</h2>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="/auth" onsubmit="showLoading(this.querySelector('button'))">
            <input type="hidden" name="action" value="login">
            
            <div class="input-container">
                <input type="text" name="username" placeholder=" " required>
                <label>Username</label>
            </div>

            <div class="input-container">
                <input type="password" name="password" placeholder=" " required>
                <label>Password</label>
            </div>

            <button type="submit">Login</button>
            <p>Don't have an account? <a onclick="showForm('signup')">Sign up</a></p>
        </form>

        <!-- Signup Form (Initially Hidden) -->
        <form id="signupForm" method="POST" action="/auth" style="display: none;" onsubmit="showLoading(this.querySelector('button'))">
            <input type="hidden" name="action" value="signup">

            <div class="input-container">
                <input type="text" name="username" placeholder=" " required>
                <label>Username</label>
            </div>

            <div class="input-container">
                <input type="password" name="password" placeholder=" " required>
                <label>Password</label>
            </div>

            <button type="submit">Sign Up</button>
            <p>Already have an account? <a onclick="showForm('login')">Login</a></p>
        </form>

        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
