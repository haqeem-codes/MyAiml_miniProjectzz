<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price Prediction</title>
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script> 

    <style>
        /* General Styles */
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(120deg, #0c0c0c, #330000);
            color: white;
            padding: 20px;
        }

        h1 { color: #ff4d4d; text-shadow: 2px 2px 10px rgba(255, 77, 77, 0.7); }

        /* Form Input & Button Styling */
        form {
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 20px;
            border: 1px solid #ff4d4d;
            background: #222;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff3333;
            box-shadow: 0px 0px 10px rgba(255, 51, 51, 0.8);
        }

        button {
            padding: 12px 20px;
            border-radius: 20px;
            border: none;
            background: #ff4d4d;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            box-shadow: 0px 5px 15px rgba(255, 77, 77, 0.3);
        }

        button:hover {
            background: #ff1a1a;
            box-shadow: 0px 8px 20px rgba(255, 26, 26, 0.6);
        }

        /* Container Styling */
        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            text-align: left;
            background: rgba(34, 34, 34, 0.8);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.5);
            border: 2px solid #ff4d4d;
        }

        .box {
            padding: 15px;
            background: rgba(40, 40, 40, 0.9);
            border-radius: 10px;
            border: 2px solid #ff4d4d;
            text-align: center;
            box-shadow: 0px 0px 10px rgba(255, 77, 77, 0.4);
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ff4d4d;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #ff4d4d;
            color: black;
        }

        /* Graph Styling */
        #plot {
            border: 2px solid #ff4d4d;
            border-radius: 10px;
            padding: 10px;
            background: rgba(20, 20, 20, 0.9);
            box-shadow: 0px 0px 15px rgba(255, 77, 77, 0.5);
        }

        /* News Button */
        .news-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff4d4d;
            color: white;
            font-weight: bold;
            padding: 12px 15px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            box-shadow: 0px 5px 15px rgba(255, 77, 77, 0.5);
            transition: 0.3s ease-in-out;
        }

        .news-btn:hover {
            background: #ff1a1a;
            box-shadow: 0px 8px 20px rgba(255, 26, 26, 0.7);
        }

        /* History Button */
        .history-btn {
            background: #ff4d4d;
            color: white;
            font-weight: bold;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }

        .history-btn:hover {
            background: #ff1a1a;
        }

        h2 {
            color: #FF4500; /* Bright Red */
            text-shadow: 2px 2px 10px rgba(255, 69, 0, 0.8);
        }
        
        h3 {
            color: #FFD700; /* Gold */
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.8);
        }

    </style>
</head>
<body>

    <!-- News Button -->
    <a href="{{ url_for('news', symbol=symbol) }}">
        <button class="news-btn">📰 View Crypto News</button>
    </a>

    <!-- History Button -->
    <div style="text-align: right; margin-bottom: 10px;">
        <a href="{{ url_for('history') }}">
            <button class="history-btn">📜 View History</button>
        </a>
    </div>

    <h1>📈 Cryptocurrency Price Prediction 📉</h1>

    <form method="POST">
        <input type="text" name="symbol" placeholder="Crypto Symbol (BTC-USD)" required>
        <button type="submit">Predict</button>
    </form>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if symbol %}
        <div class="container">
            <div class="box">
                <h2>Crypto: {{ symbol }}</h2>
                <h3>💰 Last Traded Price (LTP): ${{ last_traded_price }}</h3>
                <h3>📈 Predicted Price (Next 60 Days): ${{ predicted_price }}</h3>

                <div id="plot">
                    {{ plot|safe }}
                </div>

            </div>
        </div>
    {% endif %}

</body>
</html>
