<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accident Prediction</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* YouTube Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .video-background .video-foreground {
            position: absolute;
            top: -50px;
            left: -50px;
            width: calc(100% + 100px);
            height: calc(100% + 100px);
            transform: scale(1.2);
            pointer-events: none;
        }

        .video-background iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Content Styling */
        .overlay-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            height: 100%;
            overflow-y: auto;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .input-section {
            width: 30%;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
        }

        .graph-section {
            width: 65%;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: red;
            color: white;
            cursor: pointer;
        }

        img {
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
        }

        .top-right-links {
            text-align: right;
            margin-bottom: 10px;
        }

        .top-right-links a {
            margin-left: 10px;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }

        .history-btn {
            background-color: white;
            color: black;
        }

        .logout-btn {
            background-color: red;
            color: white;
        }

        h2 {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <!-- Video Background -->
    <div class="video-background">
        <div class="video-foreground">
            <iframe
                src="https://www.youtube.com/embed/qu8ZUWudetU?autoplay=1&mute=1&loop=1&playlist=qu8ZUWudetU&controls=0&showinfo=0&modestbranding=1&rel=0&autohide=1"
                frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Content Overlay -->
    <div class="overlay-content">

        <div class="top-right-links">
            <a href="/history" class="history-btn">History</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

        <h2>🚦 Accident Prediction System</h2>

        <div class="container">
            <div class="input-section">
                <form id="prediction-form">
                    <input type="text" name="state" placeholder="Enter State Name" required>
                    <input type="number" name="year" placeholder="Enter Year for Prediction" required>
                    <button type="submit">Predict</button>
                </form>
                <h3 id="result"></h3>
                <h4 id="dangerous-time"></h4>
            </div>

            <div class="graph-section">
                <img id="graph-total">
                <img id="graph-time">
                <img id="graph-predicted-time">
            </div>
        </div>

    </div>

    <script>
        document.getElementById("prediction-form").onsubmit = async function (e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Network response was not OK");

                const data = await response.json();

                if (data.error) {
                    document.getElementById("result").innerText = data.error;
                    document.getElementById("dangerous-time").innerText = "";
                    return;
                }

                document.getElementById("result").innerText = `Predicted Accidents: ${data.predicted_total_accidents}`;
                document.getElementById("dangerous-time").innerText = `Most Dangerous Time: ${data.most_dangerous_time} (${data.most_accidents} accidents)`;

                document.getElementById("graph-total").src = "data:image/png;base64," + data.graph_total;
                document.getElementById("graph-time").src = "data:image/png;base64," + data.graph_time;
                document.getElementById("graph-predicted-time").src = "data:image/png;base64," + data.graph_predicted_time;
            } catch (err) {
                document.getElementById("result").innerText = "❌ Error fetching prediction.";
                console.error("Fetch error:", err);
            }
        };
    </script>

</body>

</html>
