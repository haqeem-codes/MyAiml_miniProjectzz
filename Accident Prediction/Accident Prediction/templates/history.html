<!DOCTYPE html>
<html>

<head>
    <title>Prediction History</title>
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            background-color: rgba(255, 255, 255, 0.1);
        }

        th,
        td {
            padding: 12px;
            border: 1px solid white;
        }

        th {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .btn {
            background-color: #ffcc00;
            color: black;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .top-buttons {
            text-align: right;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="top-buttons">
        <a href="/predict" class="btn">Back to Prediction</a>
        <a href="/download_history" class="btn">Download CSV</a>
        <a href="/logout" class="btn" style="background-color: red; color: white;">Logout</a>
    </div>

    <h2>📜 Prediction History for {{ session.username }}</h2>
    <table>
        <tr>
            <th>State</th>
            <th>Year</th>
            <th>Predicted Accidents</th>
            <th>Most Dangerous Time</th>
            <th>Accidents in that Time</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>


</body>

</html>
